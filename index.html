<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaleed Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- زر تبديل اللغة أعلى الشاشة -->
    <div class="lang-container">
        <button id="lang-btn" class="lang-btn">English</button>
    </div>

    <div class="dashboard-container">
        <h1 class="main-title" id="main-title">التقييم المباشر للجمهور</h1>
        
        <div class="flavors-row">
            <!-- النكهة الأولى -->
            <div class="flavor-card" id="raspberry">
                <div class="header-zone">
                    <h2 class="flavor-title" data-ar="التوت العليق والتفاح" data-en="RASPBERRY & APPLE">التوت العليق والتفاح</h2>
                </div>
                <div class="can-stage">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/APPLE-BERRY-CAN_ly0oev.png" alt="Raspberry & Apple" class="can-img">
                </div>
                <div class="rating-zone">
                    <div class="rating-number"><span class="score">0.0</span>/5</div>
                    <div class="stars-display">
                        <div class="stars-inactive">★★★★★</div>
                        <div class="stars-active" id="stars-active-raspberry">★★★★★</div>
                    </div>
                    <div class="total-votes">0 <span class="vote-word">تصويت</span></div>
                </div>
            </div>

            <!-- النكهة الثانية -->
            <div class="flavor-card" id="blackberry">
                <div class="header-zone">
                    <h2 class="flavor-title" data-ar="التوت الأسود والعنب" data-en="BLACKBERRY & GRAPE">التوت الأسود والعنب</h2>
                </div>
                <div class="can-stage">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/BLACKBERRY-_-GRAPE-CAN_npyf0h.png" alt="Blackberry & Grape" class="can-img">
                </div>
                <div class="rating-zone">
                    <div class="rating-number"><span class="score">0.0</span>/5</div>
                    <div class="stars-display">
                        <div class="stars-inactive">★★★★★</div>
                        <div class="stars-active" id="stars-active-blackberry">★★★★★</div>
                    </div>
                    <div class="total-votes">0 <span class="vote-word">تصويت</span></div>
                </div>
            </div>

            <!-- النكهة الثالثة -->
            <div class="flavor-card" id="elderflower">
                <div class="header-zone">
                    <h2 class="flavor-title" data-ar="زهرة البيلسان والتفاح" data-en="ELDERFLOWER & APPLE">زهرة البيلسان والتفاح</h2>
                </div>
                <div class="can-stage">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/ELDERFLOWER-_-APPLE-CAN_afk3hf.png" alt="Elderflower & Apple" class="can-img">
                </div>
                <div class="rating-zone">
                    <div class="rating-number"><span class="score">0.0</span>/5</div>
                    <div class="stars-display">
                        <div class="stars-inactive">★★★★★</div>
                        <div class="stars-active" id="stars-active-elderflower">★★★★★</div>
                    </div>
                    <div class="total-votes">0 <span class="vote-word">تصويت</span></div>
                </div>
            </div>
        </div>

        <!-- قسم الإحصائيات الإجمالية بالأسفل -->
        <div class="global-stats-footer">
            <div class="stat-box">
                <div class="stat-label" id="lbl-total-participants">إجمالي المشاركين</div>
                <div class="stat-value" id="global-count">0</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-box">
                <div class="stat-label" id="lbl-global-rating">متوسط التقييم العام</div>
                <div class="stat-value" id="global-average">0.0 <span class="small-five">/5</span></div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
