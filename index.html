<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaleed Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <!-- استدعاء مكتبة الأيقونات الشهيرة FontAwesome لظهور شعارات السوشيال ميديا بدقة عالية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- قسم اللوقو والعناوين -->
        <header class="dashboard-header">
            <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783517527/fdb53378-f67d-47f4-b571-16353e5384a5_gooyte.webp" alt="Jaleed Logo" class="logo-img">
            <h1 class="title-ar">تقييم نكهات جليد</h1>
            <h2 class="title-en">JALEED FLAVORS RATING</h2>
        </header>
        
        <!-- صف النكهات -->
        <div class="flavors-row">
            <!-- 1. التوت العليق والتفاح -->
            <div class="flavor-card color-raspberry" id="raspberry">
                <div class="header-zone">
                    <h2>RASPBERRY & APPLE</h2>
                </div>
                <div class="can-stage">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/APPLE-BERRY-CAN_ly0oev.png" alt="Raspberry & Apple" class="can-img">
                </div>
                <div class="rating-zone">
                    <div class="rating-number"><span class="score">0.0</span>/5</div>
                    <div class="stars-display">
                        <div class="stars-inactive">★★★★★</div>
                        <div class="stars-active" id="stars-active-raspberry">★★★★★</div>
                    </div>
                    <div class="total-votes">0 votes</div>
                </div>
            </div>

            <!-- 2. التوت الأسود والعنب -->
            <div class="flavor-card color-blackberry" id="blackberry">
                <div class="header-zone">
                    <h2>BLACKBERRY & GRAPE</h2>
                </div>
                <div class="can-stage">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/BLACKBERRY-_-GRAPE-CAN_npyf0h.png" alt="Blackberry & Grape" class="can-img">
                </div>
                <div class="rating-zone">
                    <div class="rating-number"><span class="score">0.0</span>/5</div>
                    <div class="stars-display">
                        <div class="stars-inactive">★★★★★</div>
                        <div class="stars-active" id="stars-active-blackberry">★★★★★</div>
                    </div>
                    <div class="total-votes">0 votes</div>
                </div>
            </div>

            <!-- 3. زهرة البيلسان والتفاح -->
            <div class="flavor-card color-elderflower" id="elderflower">
                <div class="header-zone">
                    <h2>ELDERFLOWER & APPLE</h2>
                </div>
                <div class="can-stage">
                    <img src="https://res.cloudinary.com/dfoch6txc/image/upload/v1783332212/ELDERFLOWER-_-APPLE-CAN_afk3hf.png" alt="Elderflower & Apple" class="can-img">
                </div>
                <div class="rating-zone">
                    <div class="rating-number"><span class="score">0.0</span>/5</div>
                    <div class="stars-display">
                        <div class="stars-inactive">★★★★★</div>
                        <div class="stars-active" id="stars-active-elderflower">★★★★★</div>
                    </div>
                    <div class="total-votes">0 votes</div>
                </div>
            </div>
        </div>

        <!-- منطقة الفوتر الموحدة: تجمع الأرقام وحسابات التواصل الاجتماعي بروابط قابلة للضغط -->
        <footer class="combined-footer">
            
            <!-- يمين: الأرقام الإحصائية -->
            <div class="global-stats-part">
                <div class="stat-box">
                    <div class="stat-icon-wrapper rating-star-icon">★</div>
                    <div class="stat-info">
                        <div class="stat-value" id="global-rating-count">0</div>
                        <div class="stat-label">Total Ratings</div>
                    </div>
                </div>
                
                <div class="stat-divider"></div>
                
                <div class="stat-box">
                    <div class="stat-icon-wrapper participant-user-icon">👥</div>
                    <div class="stat-info">
                        <div class="stat-value" id="global-participants-count">0</div>
                        <div class="stat-label">Total Participants</div>
                    </div>
                </div>
            </div>

            <!-- يسار: قسم السوشيال ميديا بالأيقونات السوداء الدائرية والروابط القابلة للضغط -->
            <div class="social-media-part">
                <span class="social-username">@jaleed.sa</span>
                <div class="social-icons">
                    <!-- رابط انستجرام -->
                    <a href="https://www.instagram.com/jaleed.sa" target="_blank" rel="noopener noreferrer" class="icon-circle">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <!-- رابط تيك توك -->
                    <a href="https://www.tiktok.com/@jaleed.sa" target="_blank" rel="noopener noreferrer" class="icon-circle">
                        <i class="fa-brands fa-tiktok"></i>
                    </a>
                    <!-- رابط سناب شات -->
                    <a href="https://www.snapchat.com/@jaleed.sa" target="_blank" rel="noopener noreferrer" class="icon-circle">
                        <i class="fa-brands fa-snapchat"></i>
                    </a>
                </div>
            </div>

        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
